---
namespaceOverride: ''
nameOverride: ''
fullnameOverride: ''
images:
  backend:
    repository: ghcr.io/pascariucosmin93/todo-backend
    tag: 0.0.9
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/pascariucosmin93/todo-frontend
    tag: 0.0.9
    pullPolicy: IfNotPresent
  postgres:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
imagePullSecrets: []
serviceAccount:
  create: false
  name: ''
backend:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  corsOrigins:
  - https://todo.example.internal
  resources: {}
frontend:
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 80
    annotations: {}
    loadBalancerIP: ''
    externalTrafficPolicy: Cluster
  runtimeConfig:
    apiUrl: https://api.todo.example.internal/api/v1
  resources: {}
externalPostgres:
  enabled: true
  host: postgres.postgress.svc.cluster.local
  port: 5432
  bootstrapDatabase: forgejo2
  auth:
    database: todolist
    username: devops
    password: devops
postgres:
  enabled: false
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ''
  auth:
    database: todolist
    username: cosmin
    password: minimouse
    existingSecret: ''
    existingSecretKeys:
      database: POSTGRES_DB
      username: POSTGRES_USER
      password: POSTGRES_PASSWORD
  resources: {}
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    frontend: todo.local
    backend: api.todo.local
  tls: []
secrets:
  create: true
