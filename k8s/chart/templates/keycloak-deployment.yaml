{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todolist.keycloakFullname" . }}
  namespace: {{ include "todolist.namespace" . }}
  labels:
    {{- include "todolist.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: keycloak
      {{- include "todolist.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: keycloak
        {{- include "todolist.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.images.keycloak.repository }}:{{ .Values.images.keycloak.tag }}"
          imagePullPolicy: {{ .Values.images.keycloak.pullPolicy }}
          args:
            - start-dev
            - --import-realm
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KC_DB
              value: dev-file
            - name: KC_HTTP_RELATIVE_PATH
              value: {{ .Values.keycloak.httpRelativePath | quote }}
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname | quote }}
            - name: KC_HOSTNAME_STRICT
              value: {{ .Values.keycloak.hostnameStrict | quote }}
          envFrom:
            - secretRef:
                name: {{ default (printf "%s-secret" (include "todolist.keycloakFullname" .)) .Values.keycloak.admin.existingSecret }}
          {{- if .Values.keycloak.realmImport.enabled }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          {{- end }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      {{- if .Values.keycloak.realmImport.enabled }}
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "todolist.keycloakFullname" . }}-realm
      {{- end }}
{{- end }}

